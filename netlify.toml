[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Tell postinstall script to skip SWC removal on Netlify — SWC works there
  NETLIFY_BUILD = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect everything through Next.js (for dynamic routes like /nft/[address]/[tokenId])
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-server-handler"
  status = 200
